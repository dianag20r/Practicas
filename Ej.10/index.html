<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous" defer></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

      <nav class="navbar sticky-top navbar-expand-md navbar-dark bg-dark sticky-bottom">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Diana</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarText"
          aria-controls="navbarText"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
          <ul class="navbar-nav me-auto mb-2 mb-md-0">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="#">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Contacto</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Productos</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
    <h1 class="display-1">Ejemplo Forms</h1>
      <div class="row fw-bold font-monospace justify-content-center">
        <div class="col-6 img-thumbnail bg-secondary mb-4">
          <form>
            <div class="row">
              <div class="form-outline mb-4 mt-2 col-4">
                <label class="form-label" for="form0">Nombre</label>
                <input type="text" id="form0" class="form-control" />
              </div>
              <div class="form-outline mb-4 mt-2 col-8">
                <label class="form-label" for="form1">Apellidos</label>
                <input type="text" id="form1" class="form-control" />
              </div>
            </div>
            <div class="form-outline mb-4">
              <label class="form-label" for="form2">Correo electrónico</label>
              <input type="email" id="form2" class="form-control" />
            </div>
            <div class="form-outline mb-4">
              <label class="form-label" for="form3">Mensaje</label>
              <textarea class="form-control" id="form3" rows="4"></textarea>
            </div>
            <div class="form-check d-flex justify-content-around mb-4">
              <div class="col-5">
                <input
                  class="form-check-input"
                  type="checkbox"
                  value=""
                  id="form4"
                  checked
                />
                <label class="form-check-label" for="form4"> Acepto las condiciones</label>
              </div>
              <button type="submit" class="btn btn-primary btn-block col-5 col-md-4"> Enviar Aplicación</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="container-fluid">
        <h2 class="display-3">Alerts!</h2>
        <div class="alert alert-info" role="alert"> Usuario autorizado</div>
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
            <strong>ERROR!</strong> Credenciales incorrectas.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>  

</body>      
</html>
